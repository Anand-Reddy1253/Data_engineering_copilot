name: source_api_weather
type: api
description: Weather API for store-level weather enrichment
base_url: ${WEATHER_API_BASE_URL}
auth_method: keyvault_ref
keyvault_secret_name: contoso-weather-api-key
rate_limit_requests_per_minute: 60
timeout_seconds: 30
retry_on_status_codes:
  - 429
  - 500
  - 502
  - 503
endpoints:
  - name: daily_weather
    path: /v1/history
    method: GET
    params:
      - date
      - location
