name: hourly_incremental
description: Incremental pipeline for high-volume POS transactions and clickstream data
schedule: "0 * * * *"
owner: data-engineering-team
notifications:
  on_failure:
    - type: email
      recipients:
        - data-team@contoso.com
  on_success: []

steps:
  - name: bronze_ingest_pos_transactions_incremental
    type: notebook
    notebook: notebooks/bronze/ingest_pos_transactions.py
    source: lakehouse/bronze/raw/pos_transactions/
    target: lakehouse/bronze/pos_transactions/
    incremental: true
    watermark_column: sale_date
    depends_on: []
    retry_policy:
      max_attempts: 3
      backoff_seconds: 30
    timeout_minutes: 15

  - name: bronze_ingest_clickstream_incremental
    type: notebook
    notebook: notebooks/bronze/ingest_clickstream.py
    source: lakehouse/bronze/raw/clickstream/
    target: lakehouse/bronze/clickstream/
    incremental: true
    watermark_column: timestamp
    depends_on: []
    retry_policy:
      max_attempts: 3
      backoff_seconds: 30
    timeout_minutes: 15

  - name: silver_clean_transactions_incremental
    type: notebook
    notebook: notebooks/silver/clean_transactions.py
    source: lakehouse/bronze/pos_transactions/
    target: lakehouse/silver/pos_transactions/
    depends_on:
      - bronze_ingest_pos_transactions_incremental
    retry_policy:
      max_attempts: 3
      backoff_seconds: 30
    timeout_minutes: 15

  - name: silver_sessionise_clicks_incremental
    type: notebook
    notebook: notebooks/silver/sessionise_clicks.py
    source: lakehouse/bronze/clickstream/
    target: lakehouse/silver/clickstream/
    depends_on:
      - bronze_ingest_clickstream_incremental
    retry_policy:
      max_attempts: 3
      backoff_seconds: 30
    timeout_minutes: 15
