name: default_checkpoint
class_name: SimpleCheckpoint
config_version: 1.0

expectation_suite_names:
  - bronze_pos_transactions
  - silver_clean_transactions
  - gold_fact_sales

run_name_template: "%Y%m%d_%H%M%S_contoso_dq"

action_list:
  - name: store_validation_result
    action:
      class_name: StoreValidationResultAction
  - name: update_data_docs
    action:
      class_name: UpdateDataDocsAction
  - name: send_email_on_failure
    action:
      class_name: EmailAction
      notify_on: failure
      notify_with: all
      smtp_address_env: SMTP_HOST
      smtp_port_env: SMTP_PORT
      receiver_emails_env: DQ_ALERT_EMAILS

validations:
  - batch_request:
      datasource_name: delta_lakehouse
      data_connector_name: default_inferred_data_connector_name
      data_asset_name: bronze_pos_transactions
    expectation_suite_name: bronze_pos_transactions

  - batch_request:
      datasource_name: delta_lakehouse
      data_connector_name: default_inferred_data_connector_name
      data_asset_name: silver_clean_transactions
    expectation_suite_name: silver_clean_transactions

  - batch_request:
      datasource_name: delta_lakehouse
      data_connector_name: default_inferred_data_connector_name
      data_asset_name: gold_fact_sales
    expectation_suite_name: gold_fact_sales
